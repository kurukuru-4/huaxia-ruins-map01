<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>秘境遗址图鉴</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script>
if (!window.echarts) {
  document.write('<script src="https://unpkg.com/echarts@5.4.3/dist/echarts.min.js"><\\/script>');
}
if (!window.echarts) {
  document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js"><\\/script>');
}
</script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; background:#000814; overflow:hidden; font-family:STKaiti,KaiTi,STSong,SimSun,serif; }
#app { width:100vw; height:100vh; display:flex; flex-direction:column; position:relative; }
#header { text-align:center; padding:11px 0 4px; z-index:10; flex-shrink:0; position:relative; background:linear-gradient(180deg,#000814 60%,transparent); }
#header h1 { font-size:clamp(16px,2.6vw,30px); color:#C8A951; letter-spacing:.22em; text-shadow:0 0 20px rgba(200,169,81,.9),0 0 50px rgba(200,169,81,.4); font-weight:normal; }
#header p { margin-top:3px; color:rgba(200,169,81,.4); font-size:clamp(9px,1vw,11px); letter-spacing:.35em; }


#map-wrap { flex:1; position:relative; min-height:0; }
#chart { width:100%; height:100%; }
#loading { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#C8A951; font-size:16px; letter-spacing:.2em; z-index:20; flex-direction:column; gap:10px; }
#loading.hidden { display:none; }
#loading span { display:block; }
.load-bar { width:150px; height:2px; background:rgba(200,169,81,.15); border-radius:2px; overflow:hidden; }
.load-inner { height:100%; background:linear-gradient(90deg,#C8A951,#FFD700); animation:la 1.5s ease-in-out infinite; }
@keyframes la { 0%{width:0%;margin-left:0} 50%{width:60%;margin-left:20%} 100%{width:0%;margin-left:100%} }

/* 朝代侧边栏 */
#era-sidebar { position:absolute; left:0; top:0; bottom:50px; width:80px; background:rgba(0,5,15,.92); border-right:1px solid rgba(200,169,81,.14); z-index:15; display:flex; flex-direction:column; overflow-y:auto; scrollbar-width:none; transition:transform .32s cubic-bezier(.4,0,.2,1); }
#era-sidebar.collapsed { transform:translateX(-80px); }
#sidebar-toggle { position:absolute; left:80px; top:calc(50% - 25px); width:18px; height:50px; background:rgba(0,5,15,.92); border:1px solid rgba(200,169,81,.22); border-left:none; border-radius:0 6px 6px 0; cursor:pointer; z-index:16; display:flex; align-items:center; justify-content:center; color:rgba(200,169,81,.55); font-size:11px; transition:left .32s cubic-bezier(.4,0,.2,1),color .18s; user-select:none; }
#sidebar-toggle:hover { color:#FFD700; background:rgba(200,169,81,.1); }
#era-sidebar::-webkit-scrollbar { display:none; }
#era-sidebar-title { color:rgba(200,169,81,.45); font-size:9px; letter-spacing:.18em; text-align:center; padding:7px 0 5px; border-bottom:1px solid rgba(200,169,81,.1); flex-shrink:0; }
.era-btn { background:transparent; border:none; border-bottom:1px solid rgba(200,169,81,.07); border-left:2.5px solid transparent; color:rgba(200,169,81,.35); padding:6px 2px; cursor:pointer; font-size:clamp(10px,1.1vw,12px); letter-spacing:.06em; transition:all .2s; font-family:inherit; text-align:center; width:100%; }
.era-btn:hover { background:rgba(200,169,81,.06); color:rgba(200,169,81,.7); }
.era-btn.active { background:rgba(200,169,81,.1); font-weight:bold; }
.era-btn .yr { font-size:.62em; opacity:.5; margin-top:1px; display:block; }

/* 朝代底栏 */
#era-bar { position:absolute; left:80px; right:0; bottom:0; height:50px; background:rgba(0,5,15,.93); border-top:1px solid rgba(200,169,81,.13); z-index:14; display:flex; align-items:center; padding:0 12px; gap:10px; overflow:hidden;  transition:left .32s cubic-bezier(.4,0,.2,1); }
#era-bar-strip { width:3px; height:28px; border-radius:2px; flex-shrink:0; }
#era-bar-name { font-size:clamp(11px,1.2vw,14px); letter-spacing:.1em; white-space:nowrap; flex-shrink:0; }
#era-bar-yrs { color:rgba(200,169,81,.38); font-size:9px; white-space:nowrap; flex-shrink:0; }
#era-bar-desc { color:rgba(200,169,81,.55); font-size:clamp(9px,.9vw,10.5px); line-height:1.5; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }

/* 详情面板 */
#panel {
  position:fixed; left:0; right:0; bottom:0;
  background:rgba(0,5,15,.97);
  border-top:1px solid rgba(200,169,81,.25);
  border-radius:16px 16px 0 0;
  padding:16px 20px 20px;
  z-index:200;
  backdrop-filter:blur(16px);
  transform:translateY(100%);
  transition:transform .32s cubic-bezier(.4,0,.2,1);
  max-height:70vh;
  overflow-y:auto;
  scrollbar-width:thin;
  scrollbar-color:rgba(200,169,81,.15) transparent;
  box-shadow:0 -8px 40px rgba(0,0,0,.6);
}
#panel.show { transform:translateY(0); }
/* 顶部拖拽把手 */
#panel::before {
  content:'';
  display:block;
  width:36px; height:3px;
  background:rgba(200,169,81,.3);
  border-radius:2px;
  margin:0 auto 12px;
}
#panel-close { position:absolute; top:14px; right:16px; background:rgba(200,169,81,.1); border:1px solid rgba(200,169,81,.25); color:rgba(200,169,81,.7); border-radius:50%; width:24px; height:24px; font-size:11px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; }
#panel-close:hover { color:#C8A951; }
#panel-typemark { font-size:10px; letter-spacing:.1em; margin-bottom:5px; padding:2px 7px; border-radius:3px; display:inline-block; }
#panel-hdr { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
#panel-top { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:8px; }
#panel-badges { display:flex; flex-wrap:wrap; gap:4px; flex-shrink:0; max-width:50%; justify-content:flex-end; }
#panel-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
#panel-name { font-size:clamp(14px,1.6vw,18px); font-weight:normal; letter-spacing:.1em; }
#panel-badges { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:9px; }
.pbadge { display:inline-block; border-radius:3px; padding:2px 6px; font-size:9.5px; letter-spacing:.07em; }
#panel-desc { color:#D4B896; font-size:clamp(11px,1.05vw,12px); line-height:1.9; letter-spacing:.04em; word-break:break-all; white-space:normal; max-width:100%; }
#panel-visit { margin-top:8px; padding:6px 9px; border-radius:5px; font-size:9.5px; line-height:1.7; }
#panel-coord { margin-top:9px; padding-top:7px; color:rgba(200,169,81,.28); font-size:9px; letter-spacing:.07em; }

/* 工具栏（左上，侧边栏右侧） */
#toolbar { position:absolute; top:52px; left:88px; right:18px; display:flex; flex-direction:column; gap:4px; z-index:13; transition:left .32s cubic-bezier(.4,0,.2,1); }
.tb-row { display:flex; flex-wrap:wrap; gap:4px; align-items:center; }
.tb-btn { background:rgba(0,5,15,.85); border:1px solid rgba(200,169,81,.2); border-radius:4px; padding:3px 9px; color:rgba(200,169,81,.48); font-size:9.5px; cursor:pointer; font-family:inherit; transition:all .2s; letter-spacing:.05em; white-space:nowrap; user-select:none; }
.tb-btn:hover { color:#C8A951; border-color:rgba(200,169,81,.55); }
.tb-btn.on { color:#FFD700; border-color:#C8A951; background:rgba(200,169,81,.1); }

/* 图例（右下） */
#legend { position:absolute; bottom:58px; right:14px; background:rgba(0,5,15,.88); border:1px solid rgba(200,169,81,.17); border-radius:7px; z-index:12; min-width:120px; overflow:hidden; }
#legend-header { display:flex; align-items:center; justify-content:space-between; padding:6px 12px; cursor:pointer; user-select:none; }
#legend-toggle-btn { background:none; border:none; color:rgba(200,169,81,.55); font-size:10px; cursor:pointer; padding:0; font-family:inherit; }
#legend-body { padding:0 12px 8px; }
#legend-body.collapsed { display:none; }
.ltitle { color:rgba(200,169,81,.58); font-size:9px; letter-spacing:.14em; margin-bottom:5px; }
.li { display:flex; align-items:center; gap:5px; margin-bottom:3px; cursor:pointer; }
.li:hover .ln { color:#FFD700; }
.ld { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.ln { color:#D4B896; font-size:9.5px; }
#legend-tip { margin-top:5px; padding-top:4px; border-top:1px solid rgba(200,169,81,.1); color:rgba(200,169,81,.22); font-size:8px; }

/* ── 境外遗迹面板 ── */
#extra-panel{position:absolute;bottom:18px;right:18px;width:262px;background:rgba(5,3,0,.93);border:1px solid rgba(200,169,81,.35);border-radius:6px;z-index:20;font-family:STKaiti,KaiTi,STSong,SimSun,serif;box-shadow:0 4px 24px rgba(0,0,0,.6);}
#extra-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;cursor:pointer;user-select:none;border-bottom:1px solid rgba(200,169,81,.15);}
#extra-header-title{color:#C8A951;font-size:12px;letter-spacing:.15em;}
#extra-toggle-arrow{color:#C8A951;font-size:11px;}
#extra-body{max-height:340px;overflow-y:auto;padding:6px 0;}
#extra-body.collapsed{display:none;}
#extra-empty{padding:14px;color:rgba(200,169,81,.35);font-size:11px;text-align:center;letter-spacing:.1em;}
.extra-card{margin:5px 10px;padding:9px 11px;background:rgba(200,169,81,.05);border:1px solid rgba(200,169,81,.12);border-radius:4px;margin-bottom:6px;}
.extra-card-header{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.extra-card-name{color:#FFD700;font-size:12px;font-weight:bold;letter-spacing:.06em;}
.extra-card-era{color:rgba(200,169,81,.6);font-size:10px;background:rgba(200,169,81,.1);border-radius:3px;padding:1px 5px;}
.extra-card-badge{margin-left:auto;font-size:9px;color:#87CEEB;background:rgba(0,100,180,.2);border:1px solid rgba(0,150,255,.25);border-radius:3px;padding:1px 5px;letter-spacing:.05em;}
.extra-card-desc{color:rgba(245,222,179,.72);font-size:10.5px;line-height:1.55;margin-bottom:5px;}
.extra-card-visit{color:rgba(135,206,235,.75);font-size:10px;line-height:1.45;border-top:1px solid rgba(200,169,81,.1);padding-top:5px;}

/* 搜索框 */
#search-wrap {
  position:absolute; right:14px; top:8px; z-index:150;
  display:flex; flex-direction:column; align-items:flex-end; gap:4px;
}
#search-input {
  width:180px; background:rgba(0,5,15,.85); border:1px solid rgba(200,169,81,.35);
  border-radius:6px; padding:5px 10px 5px 30px; color:#D4B896;
  font-family:STKaiti,KaiTi,serif; font-size:12px; outline:none;
  transition:border-color .2s, width .2s;
}
#search-input:focus { border-color:rgba(200,169,81,.7); width:220px; }
#search-input::placeholder { color:rgba(200,169,81,.35); }
#search-icon {
  position:absolute; left:8px; top:50%; transform:translateY(-50%);
  color:rgba(200,169,81,.5); font-size:12px; pointer-events:none;
}
#search-results {
  width:220px; background:rgba(0,5,15,.95); border:1px solid rgba(200,169,81,.25);
  border-radius:6px; overflow:hidden; max-height:260px; overflow-y:auto;
  scrollbar-width:thin; scrollbar-color:rgba(200,169,81,.15) transparent;
  display:none;
}
#search-results.show { display:block; }
.sr-item {
  padding:7px 12px; cursor:pointer; border-bottom:1px solid rgba(200,169,81,.08);
  transition:background .15s;
}
.sr-item:last-child { border-bottom:none; }
.sr-item:hover { background:rgba(200,169,81,.1); }
.sr-name { color:#D4B896; font-size:12px; font-family:STKaiti,KaiTi,serif; }
.sr-meta { color:rgba(200,169,81,.5); font-size:10px; margin-top:2px; }
.sr-empty { padding:12px; color:rgba(200,169,81,.35); font-size:11px; text-align:center; }
#search-clear {
  position:absolute; right:8px; top:50%; transform:translateY(-50%);
  color:rgba(200,169,81,.4); font-size:11px; cursor:pointer;
  display:none; transition:color .15s;
}
#search-clear:hover { color:rgba(200,169,81,.9); }
#search-input:not(:placeholder-shown) ~ #search-clear { display:block; }

@media (max-width: 768px) {
  #header {
    padding: 8px 0 2px;
  }

  #header h1 {
    font-size: 18px;
    letter-spacing: .14em;
  }

  #header p {
    font-size: 9px;
    letter-spacing: .18em;
  }

  #era-sidebar {
    transform: translateX(-80px);
  }

  #sidebar-toggle {
    left: 0 !important;
    top: 44%;
    width: 20px;
    height: 44px;
  }

  #era-bar {
    left: 0 !important;
    height: 44px;
    padding: 0 8px;
    gap: 6px;
  }

  #era-bar-name {
    font-size: 12px;
  }

  #era-bar-yrs {
    display: none;
  }

  #era-bar-desc {
    font-size: 9px;
    -webkit-line-clamp: 1;
  }

  #toolbar {
    top: 46px;
    left: 8px !important;
    right: 8px;
    gap: 6px;
  }

  .tb-row {
    flex-wrap: nowrap;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }

  .tb-row::-webkit-scrollbar {
    display: none;
  }

  .tb-btn {
    flex: 0 0 auto;
    font-size: 10px;
    padding: 5px 8px;
  }

  #search-wrap {
    top: 6px;
    right: 8px;
  }

  #search-input {
    width: min(62vw, 200px);
    font-size: 12px;
  }

  #search-input:focus {
    width: min(70vw, 220px);
  }

  #search-results {
    width: min(70vw, 220px);
    max-height: 200px;
  }

  #legend {
    right: 8px;
    bottom: 52px;
    min-width: 92px;
    max-width: 42vw;
  }

  #legend-header {
    padding: 5px 8px;
  }

  #legend-body {
    padding: 0 8px 6px;
  }

  .ln {
    font-size: 9px;
  }

  #extra-panel {
    right: 8px;
    bottom: 108px;
    width: min(72vw, 220px);
  }

  #extra-body {
    max-height: 180px;
  }

  #panel {
    padding: 14px 14px 18px;
    max-height: 78vh;
    border-radius: 14px 14px 0 0;
  }

  #panel-name {
    font-size: 16px;
  }

  #panel-desc {
    font-size: 12px;
    line-height: 1.75;
  }
}

</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>秘境遗址图鉴</h1>
    <p>华夏疆域与考古秘境 · 千年尘封，一图尽览</p>
    
  </div>
  <div id="search-wrap">
    <div style="position:relative">
      <span id="search-icon">🔍</span>
      <input id="search-input" type="text" placeholder="搜索遗址、朝代..." oninput="doSearch(this.value)" onblur="setTimeout(function(){hideSearch()},200)">
      <span id="search-clear" onclick="clearSearch()" title="清空">✕</span>
    </div>
    <div id="search-results"></div>
  </div>
  <div id="map-wrap">
    <div id="loading"><span>正在加载华夏地图...</span><div class="load-bar"><div class="load-inner"></div></div></div>
    <div id="chart"></div>
  </div>
  <div id="era-bar">
    <div id="era-bar-strip"></div>
    <div id="era-bar-name"></div>
    <div id="era-bar-yrs"></div>
    <div id="era-bar-desc"></div>
  </div>
</div>

<div id="era-sidebar">
  <div id="era-sidebar-title">朝代纪年</div>
  <div id="era-list"></div>
</div>
<div id="sidebar-toggle" onclick="toggleSidebar()">❯</div>

<!-- 工具栏：连线 + 各类型开关 -->
<div id="toolbar">
  <div class="tb-row">
    <button class="tb-btn" id="btn-routes" onclick="toggleFilter('routes');event.stopPropagation()">◈ 丝路连线</button>
    <button class="tb-btn on" id="btn-MUMMY" onclick="toggleFilter('MUMMY');event.stopPropagation()">● 古尸遗址</button>
    <button class="tb-btn on" id="btn-COFFIN" onclick="toggleFilter('COFFIN');event.stopPropagation()">● 悬棺/古棺</button>
    <button class="tb-btn on" id="btn-PALACE" onclick="toggleFilter('PALACE');event.stopPropagation()">● 地宫(可入)</button>
  </div>
  <div class="tb-row">
    <button class="tb-btn on" id="btn-PALACE_X" onclick="toggleFilter('PALACE_X');event.stopPropagation()">● 地宫(未开)</button>
    <button class="tb-btn on" id="btn-BRONZE" onclick="toggleFilter('BRONZE');event.stopPropagation()">● 青铜/祭祀</button>
    <button class="tb-btn on" id="btn-TREASURE" onclick="toggleFilter('TREASURE');event.stopPropagation()">● 王陵宝藏</button>
    <button class="tb-btn on" id="btn-MURAL_TOMB" onclick="toggleFilter('MURAL_TOMB');event.stopPropagation()">● 壁画墓</button>
  </div>
</div>


<!-- 境外遗迹面板 -->
<div id="extra-panel">
  <div id="extra-header" onclick="toggleExtraPanel()">
    <span id="extra-header-title">&#9670; 境外遗迹</span>
    <span id="extra-toggle-arrow">&#10095;</span>
  </div>
  <div id="extra-body" class="collapsed">
    <div id="extra-empty">当前朝代无境外遗迹记录</div>
  </div>
</div>

<div id="panel">
  <button id="panel-close" onclick="closePanel()">✕</button>
  <div id="panel-typemark"></div>
  <div id="panel-top">
    <div>
      <div id="panel-hdr"><div id="panel-dot"></div><div id="panel-name"></div></div>
    </div>
    <div id="panel-badges"></div>
  </div>
  <div id="panel-desc"></div>
  <div id="panel-visit"></div>
  <div id="panel-coord"></div>
</div>

<div id="legend">
  <div id="legend-header" onclick="toggleLegend()">
    <span class="ltitle" style="margin:0">▪ 遗址图例</span>
    <button id="legend-toggle-btn">▲</button>
  </div>
  <div id="legend-body">
    <div id="legend-items"></div>
    <div id="legend-tip">点击遗址查看详情</div>
  </div>
</div>

<script>
var isMobilePortrait = window.matchMedia('(max-width: 768px)').matches;

// ============================================================
// \u7C7B\u578B\u5B9A\u4E49
// ============================================================
var TYPES = {
  MUMMY:    { label:'\u53E4\u5C38\u9057\u5740',    color:'#5B9EA0' },  // 明水鸭色
  COFFIN:   { label:'\u60AC\u68FA/\u53E4\u68FA',   color:'#B85C4A' },  // 辛辣红
  PALACE:   { label:'\u5730\u5BAB(\u53EF\u5165)',  color:'#D4874E' },  // 黄玉黄橙
  PALACE_X: { label:'\u5730\u5BAB(\u672A\u5F00)',  color:'#C4A882' },  // 苍白赭
  BRONZE:   { label:'\u9752\u94DC/\u796D\u7940',   color:'#7A8C5E' },  // 山葵绿
  TREASURE: { label:'\u738B\u9675\u5B9D\u85CF',    color:'#4A7B9D' },  // 刚玉蓝
  MURAL_TOMB: { label:'\u58C1\u753B\u5893', color:'#8F7AC8' },
};

// \u7ED9\u5DE5\u5177\u680F\u6309\u94AE\u4E0A\u989C\u8272
Object.keys(TYPES).forEach(function(k) {
  var btn = document.getElementById('btn-' + k);
  if (btn) btn.style.color = TYPES[k].color;
});

// ============================================================
// \u671D\u4EE3\u6570\u636E \u2014 16\u671D\uFF0C\u6BCF\u671D\u8FB9\u754C ~25-30 \u4E2A\u5750\u6807\u70B9
// ============================================================
var ERAS = [
  { label:'\u897F\u5468', yrs:'\u524D1046\u2014\u524D771', color:'#B8860B',
    desc:'\u5468\u6B66\u738B\u706D\u5546\u5EFA\u5468\uFF0C\u5B9A\u90FD\u9550\u4EAC\u3002\u5B9E\u884C\u5206\u5C01\u5236\uFF0C\u793C\u4E50\u9F0E\u76DB\uFF0C\u53F2\u79F0\u300C\u90C1\u90C1\u4E4E\u6587\u54C9\u300D\uFF0C\u534E\u590F\u793C\u5236\u4E4B\u6E90\u3002',

{ name:'郝匠金墓', coord:[112.83,35.50], era:'金', type:'MURAL_TOMB', visitOk:false,
    desc:'山西晋城郝匠一带发现的宋金时期高等级壁画砖雕墓，墓室结构完整，砖雕门楼、侍从仪仗与彩绘内容保存较好，能直观看到金代北方墓葬的空间布局与世俗生活审美。其震撼之处不在尸体，而在“地下宅邸”般的墓室仪式感。',
    visit:'遗址以保护与研究为主，原墓通常不作常规下墓开放，相关资料与复制展示更适合参观。' },
{ name:'太原郭行墓', coord:[112.49,37.84], era:'唐', type:'MURAL_TOMB', visitOk:false,
    desc:'太原近年公布的重要唐代壁画墓，墓道与墓室壁画内容丰富，可见侍从、出行与生活场景，画风细腻，具有很强的晚唐墓葬视觉冲击力。它更像一座被封存于地下的绘画长廊。',
    visit:'以考古保护为主，原址一般不作常规开放；可关注山西地区博物馆专题展与资料展示。' },
{ name:'磁县北朝墓群', coord:[114.37,36.37], era:'南北朝', type:'MURAL_TOMB', visitOk:false,
    desc:'河北磁县一带分布着东魏北齐时期高等级墓群，墓葬数量多、等级高，壁画、陶俑与墓制信息极具代表性，是理解北朝皇家与贵族墓葬体系的重要区域。它更适合作为“墓群型秘境”来读，而不是单一地宫点位。',
    visit:'墓群整体以保护为主，部分成果可在邯郸、磁县相关展陈中了解，原址并非统一常规开放。' },
{ name:'南唐二陵', coord:[118.67,31.86], era:'五代', type:'PALACE', visitOk:true,
    desc:'南京南唐二陵位于祖堂山南麓，为南唐烈祖李昪钦陵与中主李璟顺陵合称。陵寝规制完整，地下空间与甬道结构清晰，是五代十国时期最具“可感知地宫气质”的王陵遗存之一。',
    visit:'《可打卡》南京南唐二陵景区已开放参观，可近距离观看陵园遗存与地宫空间展示。' },
{ name:'打虎亭汉墓', coord:[113.41,34.53], era:'东汉', type:'MURAL_TOMB', visitOk:false,
    desc:'河南新密打虎亭汉墓常被称作“东汉第一大墓”，以大型画像石与墓室结构闻名。墓内内容涵盖宴饮、车马、乐舞、庖厨等题材，像一部压进石头里的东汉生活电影。它更偏视觉叙事型秘境，而不是可下探的开放地宫。',
    visit:'原址以封护保存为主，常规下墓参观条件有限，相关内容多见于资料介绍与地方展陈。' },
{ name:'印山越国王陵', coord:[120.54,29.93], era:'春秋', type:'TREASURE', visitOk:true,
    desc:'绍兴印山越国王陵为春秋晚期大型高等级墓葬，封土规模宏大，常被认为与越王族系密切相关。它的魅力在于山体封土、王陵气势与越文化神秘感交织，是“王陵型秘境”的代表之一。',
    visit:'《可打卡》位于绍兴兰亭一带，可结合印山遗址、越文化线路参观。' },
{ name:'大葆台汉墓', coord:[116.29,39.81], era:'西汉', type:'PALACE', visitOk:true,
    desc:'北京大葆台汉墓为西汉广阳顷王刘建及王后墓葬，以完整的黄肠题凑葬制闻名。地下结构展示性强，能直观看见汉代高等级王陵如何“以木构地下宫殿”来安置亡者，体验感很强。',
    visit:'《可打卡》大葆台西汉墓遗址及相关展陈可参观，是北京看汉代地下葬制最直观的一站。' }
  ,{ name:'法门寺地宫', coord:[107.89,34.52], era:'唐', type:'PALACE', visitOk:true,
    desc:'唐代皇家地宫，封存佛指舍利千年。1987年开启后出土大批金银器与供奉器物，被誉为“地下佛国”，是最具传奇色彩的可入式地宫之一。',
    visit:'《可打卡》陕西扶风法门寺景区，珍宝馆与地宫展示区开放' }
  ,{ name:'秦始皇陵', coord:[109.28,34.38], era:'秦', type:'PALACE_X', visitOk:true,
    desc:'中国历史上最宏大的帝陵，传说地宫内有水银江河与机关暗道。主体至今未发掘，笼罩巨大谜团，与兵马俑共同构成想象中的“地下帝国”。',
    visit:'《可打卡》秦始皇帝陵博物院与陵区可参观，主地宫未开放' }
  ,{ name:'殷墟', coord:[114.30,36.13], era:'商', type:'BRONZE', visitOk:true,
    desc:'商王朝晚期都城遗址，王陵区、祭祀坑与甲骨文共同构成神秘而压迫感十足的地下世界。这里是青铜、占卜与王权交织的源头。',
    visit:'《可打卡》安阳殷墟博物馆与宫殿宗庙遗址区' }
  ,{ name:'妇好墓', coord:[114.31,36.12], era:'商', type:'TREASURE', visitOk:true,
    desc:'殷墟王陵区唯一未被盗掘的完整商代墓葬。墓主人妇好既是王后也是女将军，出土青铜器、玉器与兵器数量惊人。',
    visit:'《可打卡》安阳殷墟妇好墓展区' }
  ,{ name:'雷峰塔地宫', coord:[120.15,30.23], era:'宋', type:'PALACE', visitOk:true,

    visit:'《可打卡》杭州雷峰塔景区，相关地宫文物可参观' }
  ,{ name:'曾侯乙墓', coord:[113.37,31.70], era:'战国', type:'TREASURE', visitOk:true,

    visit:'《可打卡》湖北省博物馆可看核心文物，原址受保护' }
,{ name:'楼兰古城', coord:[89.68,40.50], era:'西汉', type:'PALACE_X', visitOk:false,
    desc:'埋于风沙中的丝路失落古城，与楼兰美女干尸、枯骨、废弃佛塔共同构成荒凉而诡异的死亡景观。',
    visit:'遗址位于保护区深处，常规游客难以进入，可在新疆相关博物馆了解文物' }
  ,{ name:'海昏侯墓', coord:[115.88,28.68], era:'西汉', type:'TREASURE', visitOk:true,

,{ name:'敦煌藏经洞', coord:[94.80,40.03], era:'唐', type:'PALACE_X', visitOk:true,

  ,{ name:'西夏王陵', coord:[106.21,38.48], era:'西夏', type:'TREASURE', visitOk:true,

  ,{ name:'永陵地宫', coord:[104.06,30.67], era:'五代', type:'PALACE', visitOk:true,
    desc:'前蜀王建之墓，是少数可步入参观的帝王地宫之一。地下石室、棺床与石刻让人有非常直接的“下墓”体验。',

  ,{ name:'昭陵', coord:[108.05,34.61], era:'唐', type:'PALACE_X', visitOk:true,

  ,{ name:'桥陵', coord:[109.21,34.69], era:'唐', type:'PALACE_X', visitOk:true,
    desc:'唐睿宗李旦陵墓，封土巨大，地宫未发掘。它与关中诸帝陵共同组成一条压迫感极强的地下皇陵带。',
    visit:'《可打卡》桥陵遗址区域，开放情况以现场为准' }
  ,{ name:'银雀山汉墓', coord:[118.35,35.05], era:'西汉', type:'TREASURE', visitOk:true,

  ,{ name:'满城汉墓', coord:[115.32,38.95], era:'西汉', type:'PALACE', visitOk:true,

  p.style.boxShadow = '0 0 20px ' + tc + '40';

  tm.textContent = '[ ' + t.label + ' ]';
  tm.style.cssText = 'font-size:10px;letter-spacing:.1em;margin-bottom:5px;padding:2px 7px;border-radius:3px;display:inline-block;color:' + tc + ';background:' + tc + '18;border:1px solid ' + tc + '44';
  document.getElementById('panel-dot').style.cssText = 'width:10px;height:10px;border-radius:50%;flex-shrink:0;background:' + tc + ';box-shadow:0 0 7px ' + tc;
  document.getElementById('panel-name').textContent = site.name;
  document.getElementById('panel-name').style.cssText = 'font-size:clamp(14px,1.6vw,18px);font-weight:normal;letter-spacing:.1em;color:' + tc;
  var badges = document.getElementById('panel-badges');
  badges.innerHTML = '';
  function addBadge(txt, c, bg) {
    var b = document.createElement('span'); b.className = 'pbadge'; b.textContent = txt;
    b.style.cssText = 'color:' + c + ';background:' + bg + ';border:1px solid ' + c + '44';
    badges.appendChild(b);
  }
  addBadge(site.era, '#C8A951', 'rgba(200,169,81,.1)');
  if (site.mummy) {
    var ma = getMummyAccent(site.mummy);
    addBadge(ma.tag, ma.color, ma.bg);
  }
  if (site.flag)  addBadge('\u4ED8\u5C5E\u56FD\u9057\u8FF9', '#87CEEB', 'rgba(135,206,235,.1)');
  if (site.visitOk) addBadge('\u53EF\u6253\u5361\u53C2\u89C2', '#52C41A', 'rgba(82,196,26,.1)');
  else              addBadge('\u66AB\u672A\u5BF9\u5916\u5F00\u653E', '#888', 'rgba(120,120,120,.1)');
  document.getElementById('panel-desc').innerHTML = '<span style="word-break:break-all;white-space:normal;display:block">' + (site.desc||'') + '</span>';
  var ve = document.getElementById('panel-visit');
  if (site.visit) {
    ve.textContent = site.visit;
    ve.style.cssText = 'margin-top:8px;padding:6px 9px;border-radius:5px;font-size:9.5px;line-height:1.7;'

      + 'border:1px solid ' + (site.visitOk ? 'rgba(82,196,26,.28)' : 'rgba(120,120,120,.25)') + ';'
      + 'color:' + (site.visitOk ? '#8BC34A' : '#888');
  } else { ve.textContent = ''; ve.style.cssText = ''; }
  document.getElementById('panel-coord').textContent = '\u5750\u6807: ' + site.coord[0] + '\u00B0E  ' + site.coord[1] + '\u00B0N';
  document.getElementById('panel-coord').style.borderTop = '1px solid ' + tc + '20';

function toggleFilter(key) {
  var btn = document.getElementById('btn-' + key);
  if (key === 'routes') {
    activeFilters.routes = !activeFilters.routes;
    btn.classList.toggle('on', activeFilters.routes);
    btn.textContent = activeFilters.routes ? '\u25C8 \u9690\u85CF\u8FDE\u7EBF' : '\u25C8 \u4E1D\u8DEF\u8FDE\u7EBF';
  } else {
    activeFilters[key] = !activeFilters[key];
    btn.classList.toggle('on', activeFilters[key]);
    btn.style.color = activeFilters[key] ? TYPES[key].color : 'rgba(200,169,81,.35)';
  }
  if (chart) renderChart();
  renderLegend();
}

function getMummyAccent(m) {
  if (m === '湿尸') return { color:'#87CEEB', bg:'rgba(135,206,235,.15)', tag:'湿尸·高保存', tip:'特征：湿尸（软组织保存较完整）' };
  if (m === '干尸') return { color:'#F4A460', bg:'rgba(244,164,96,.15)', tag:'干尸·自然脱水', tip:'特征：干尸（自然脱水保存）' };
  if (m === '鞣尸') return { color:'#98FB98', bg:'rgba(152,251,152,.15)', tag:'鞣尸·特殊处理', tip:'特征：鞣尸（经特殊处理保存）' };
  return { color:'#E0B0FF', bg:'rgba(224,176,255,.15)', tag:m, tip:'特征：' + m };
}

var searchHighlight = [];

function clearSearch() {
  var input = document.getElementById('search-input');
  input.value = '';
  doSearch('');
  input.focus();
}

function doSearch(val) {
  var box = document.getElementById('search-results');
  val = val.trim();
  if (!val) { box.classList.remove('show'); box.innerHTML = ''; searchHighlight = []; if(chart) renderChart(); return; }

  var allS = SITES.concat(SITES_EXTRA);
  var results = allS.filter(function(s) {
    return s.name.indexOf(val) >= 0
      || s.era.indexOf(val) >= 0
      || (s.desc && s.desc.indexOf(val) >= 0);
  });

  searchHighlight = results.map(function(s){ return s.name; });
  if (chart) renderChart();

  box.innerHTML = '';
  if (results.length === 0) {
    box.innerHTML = '<div class="sr-empty">未找到「' + val + '」相关遗址</div>';
  } else {
    results.forEach(function(s) {
      var tc = TYPES[s.type].color;
      var div = document.createElement('div');
      div.className = 'sr-item';
      div.innerHTML = '<div class="sr-name"><span style="color:'+tc+';margin-right:5px">●</span>' + s.name + '</div>'
        + '<div class="sr-meta">' + s.era + ' · ' + TYPES[s.type].label + '</div>';
      div.onclick = function() {
        showPanel(s);
        searchHighlight = [s.name];
        document.getElementById('search-input').value = s.name;
        box.classList.remove('show');
        if (chart) renderChart();
      };
      box.appendChild(div);
    });
  }
  box.classList.add('show');
}

function hideSearch() {
  document.getElementById('search-results').classList.remove('show');
}

function switchEra(label) {
  document.getElementById('panel').classList.remove('show');
  // 清除所有按钮高亮（包括全部按钮）
  ERAS.forEach(function(e) {
    var btn = document.getElementById('era-btn-' + e.label);
    if (!btn) return;
    btn.classList.remove('active'); btn.style.color = ''; btn.style.borderLeftColor = '';
  });
  var allB = document.getElementById('era-btn-all');
  if (allB) { allB.classList.remove('active'); allB.style.color=''; allB.style.borderLeftColor=''; }

  if (label === '全部') {
    if (allB) { allB.classList.add('active'); allB.style.color='#C8A951'; allB.style.borderLeftColor='#C8A951'; }
    currentEra = '全部';
    updateEraBar({label:'全部', color:'#C8A951', yrs:'全朝代', desc:'华夏千年，万墳墓迹，一图尽览。'});
    if (chart) renderChart();
    renderLegend();
    return;
  }
  ERAS.forEach(function(e) {
    var btn = document.getElementById('era-btn-' + e.label);
    if (!btn) return;
    if (e.label === label) { btn.classList.add('active'); btn.style.color = e.color; btn.style.borderLeftColor = e.color; }
  });
  currentEra = label;
  updateEraBar(ERAS.find(function(e) { return e.label === label; }));
  if (chart) renderChart();
  renderLegend();
}

// \u6E32\u67D3\u56FE\u8868
// ============================================================
function renderChart() {
  var eraInfo = currentEra==='全部' ? {label:'全部',color:'#C8A951',yrs:'',desc:''} : ERAS.find(function(e){return e.label===currentEra;});
  var borderCoords = eraInfo.border || [];
  var activeDyn = (function(){
    if (currentEra!=='全部') return ERA_MATCH[currentEra]||[currentEra];
    var all=[];
    ERAS.forEach(function(e){all.push(e.label);});
    Object.keys(ERA_MATCH).forEach(function(k){
      ERA_MATCH[k].forEach(function(v){if(all.indexOf(v)<0)all.push(v);});
    });
    return all;
  })();

  // \u5F53\u524D\u671D\u4EE3\u6D3B\u8DC3\u9057\u5740\uFF08\u5408\u5E76\u4E3B+\u9644\u52A0\uFF09
  var allSites = SITES.concat(SITES_EXTRA);
  var visibleSites = searchHighlight.length > 0
    ? allSites.filter(function(s) { return searchHighlight.indexOf(s.name) >= 0; })
    : allSites.filter(function(s) { return activeFilters[s.type]; });
  var activeSites = visibleSites.filter(function(s) { return searchHighlight.length > 0 || activeDyn.indexOf(s.era) >= 0; });

  var series = [];

  // \u8FDE\u7EBF\u8DEF\u7EBF
  if (activeFilters.routes) {
    ROUTES.forEach(function(r) {
      series.push({
        name:r.name, type:'lines', coordinateSystem:'geo', zlevel:3,
        effect:{ show:true, period:4, trailLength:.6, symbolSize:5, color:r.color },
        lineStyle:{ color:r.color, width:1.5, opacity:.45, curveness:.2, shadowColor:r.color, shadowBlur:8 },
        data: r.coords.slice(0,-1).map(function(c,i) { return { coords:[c,r.coords[i+1]] }; }),
      });
    });
  }

  // \u6240\u6709\u53EF\u89C1\u9057\u5740\uFF08\u975E\u5F53\u671D\u7070\u663E\uFF09
  if (visibleSites.length > 0) {
    series.push({
      name:'sites', type:'scatter', coordinateSystem:'geo', zlevel:4, clip:false,
      data: visibleSites.map(function(s) {
        var active = activeDyn.indexOf(s.era) >= 0;
        var tc = TYPES[s.type].color;
        return { name:s.name, value:s.coord, itemStyle:{ color: active ? tc : 'rgba(70,55,40,0.2)' } };
      }),
      symbolSize: function(val, params) {
        var s = visibleSites[params.dataIndex];
        if (searchHighlight.length > 0 && searchHighlight.indexOf(s.name) >= 0) return 12;
        if (s.type === 'MURAL_TOMB') return activeDyn.indexOf(s.era) >= 0 ? 6 : 4;
        if (s.type === 'MUMMY' && s.mummy === '湿尸') return activeDyn.indexOf(s.era) >= 0 ? 8 : 5;
        if (s.type === 'MUMMY' && s.mummy === '干尸') return activeDyn.indexOf(s.era) >= 0 ? 7 : 4;
        return activeDyn.indexOf(s.era) >= 0 ? 7 : 4;
      },
      label: { show:false },
    });
  }

  // \u5F53\u671D\u9057\u5740\u6D9F\u6F2A
  if (activeSites.length > 0) {
    series.push({
      name:'active', type:'effectScatter', coordinateSystem:'geo', zlevel:5, clip:false,
      data: activeSites.map(function(s) {
        return { name:s.name, value:s.coord, itemStyle:{ color:TYPES[s.type].color } };
      }),
      symbolSize:function(val, params){
        var s = activeSites[params.dataIndex];
        if (s && s.type === 'MURAL_TOMB') return 8;
        if (s && s.type === 'MUMMY' && s.mummy === '湿尸') return 11;
        return 10;
      },
      rippleEffect:{ brushType:'stroke', scale:3, period:2.2 },
      label:{
        show:true, formatter:'{b}', position:'right',
        color:'#FFD700', fontSize:12, fontWeight:'bold',
        fontFamily:'STKaiti,KaiTi,serif',
        textShadowColor:'rgba(0,0,0,.9)', textShadowBlur:5,
      },
    });
  }

  chart.setOption({
    backgroundColor:'#000814',
    tooltip:{
      trigger:'item', backgroundColor:'rgba(0,0,0,.92)', borderColor:'#C8A951', borderWidth:1,
      textStyle:{ color:'#F5DEB3', fontSize:12 },
      formatter: function(params) {
        if (params.seriesName === 'sites' || params.seriesName === 'active') {
          var allS = SITES.concat(SITES_EXTRA);
          var s = null;
          for (var i=0; i<allS.length; i++) { if (allS[i].name === params.name) { s = allS[i]; break; } }
          if (!s) return '';
          var tc = TYPES[s.type].color;
          return '<div style="max-width:220px;word-break:break-all;white-space:normal">'
            + '<b style="color:' + tc + ';font-size:14px">' + s.name + '</b><br>'
            + '<span style="color:#999;font-size:10px">' + TYPES[s.type].label + ' \u00B7 ' + s.era
            + (s.mummy ? ' \u00B7 ' + s.mummy : '')
            + (s.flag ? ' \u00B7 \u4ED8\u5C5E\u56FD' : '') + '</span><br>'
            + '<span style="font-size:11px;line-height:1.6">' + s.desc.substring(0,55) + '...</span><br>'
            + '<span style="color:' + (s.visitOk ? '#8BC34A' : '#777') + ';font-size:10px">'
            + (s.visitOk ? '[ \u53EF\u6253\u5361 ]' : '[ \u66AB\u672A\u5F00\u653E ]') + '</span>'
            + '</div>';
        }
        return '';
      }
    },
    geo:{
      map:'china', roam:true, zoom:1.15, center:[104,37],
      itemStyle:{ areaColor:'#1a1208', borderColor:'#C8A951', borderWidth:.75, shadowColor:'rgba(200,169,81,.12)', shadowBlur:8 },
      emphasis:{ itemStyle:{ areaColor:'#2d2010', borderColor:'#FFD700', borderWidth:1.3 }, label:{ show:false } },
      label:{ show:false },
    },
    series: series,
  }, true);
  renderExtraPanel();
}

// ============================================================
// 境外遗迹卡片面板
// ============================================================
var extraOpen = false;
function toggleExtraPanel() {
  extraOpen = !extraOpen;
  var b = document.getElementById('extra-body');
  var a = document.getElementById('extra-toggle-arrow');
  if (extraOpen) { b.classList.remove('collapsed'); a.innerHTML = '&#10094;'; }
  else { b.classList.add('collapsed'); a.innerHTML = '&#10095;'; }
}
function renderExtraPanel() {
  var body = document.getElementById('extra-body');
  var empty = document.getElementById('extra-empty');
  var activeDyn;
  if (currentEra === '全部') {
    // 包含所有朝代标签 + ERA_MATCH 里的别名（如"汉"）
    activeDyn = [];
    ERAS.forEach(function(e) { activeDyn.push(e.label); });
    Object.keys(ERA_MATCH).forEach(function(k) {
      ERA_MATCH[k].forEach(function(v) { if (activeDyn.indexOf(v) < 0) activeDyn.push(v); });
    });
  } else {
    activeDyn = ERA_MATCH[currentEra] || [currentEra];
  }
  var matched = SITES_EXTRA.filter(function(s) { return activeDyn.indexOf(s.era) >= 0; });
  body.querySelectorAll('.extra-card').forEach(function(c) { c.parentNode.removeChild(c); });
  if (matched.length === 0) {
    empty.style.display = 'block';
    if (extraOpen) {
      extraOpen = false;
      document.getElementById('extra-body').classList.add('collapsed');
      document.getElementById('extra-toggle-arrow').innerHTML = '&#10095;';
    }
    return;
  }
  empty.style.display = 'none';
  matched.forEach(function(s) {
    var card = document.createElement('div');
    card.className = 'extra-card';
    card.innerHTML =
      '<div class="extra-card-header">'
      + '<span class="extra-card-name">' + s.name + '</span>'
      + '<span class="extra-card-era">' + s.era + '</span>'
      + '<span class="extra-card-badge">\u5883\u5916</span>'
      + '</div>'
      + '<div class="extra-card-desc">' + s.desc + '</div>'
      + (s.visit ? '<div class="extra-card-visit">&#9654; ' + s.visit + '</div>' : '');
    body.appendChild(card);
  });
  // 仅在非手机端自动展开；竖屏手机默认保持折叠，避免挡住地图
  if (!extraOpen && !isMobilePortrait) {
    extraOpen = true;
    document.getElementById('extra-body').classList.remove('collapsed');
    document.getElementById('extra-toggle-arrow').innerHTML = '&#10094;';
  }
}

// ============================================================
// \u70B9\u51FB\u9057\u5740
// ============================================================
function handleSiteClick(name) {
  var allS = SITES.concat(SITES_EXTRA);
  for (var i=0; i<allS.length; i++) {
    if (allS[i].name === name) { showPanel(allS[i]); return; }
  }
}

// ============================================================
// \u591A\u6E90\u5730\u56FE\u52A0\u8F7D\uFF08\u4E0E\u539F\u7248\u5B8C\u5168\u76F8\u540C\u7684\u903B\u8F91\uFF09
// ============================================================
var sidebarOpen = !isMobilePortrait;

var legendOpen = !isMobilePortrait;
function toggleLegend() {
  legendOpen = !legendOpen;
  var body = document.getElementById('legend-body');
  var btn = document.getElementById('legend-toggle-btn');
  if (legendOpen) { body.classList.remove('collapsed'); btn.innerHTML = '▲'; }
  else { body.classList.add('collapsed'); btn.innerHTML = '▼'; }
}
function toggleSidebar(){
  sidebarOpen=!sidebarOpen;
  var sb=document.getElementById("era-sidebar");
  var tg=document.getElementById("sidebar-toggle");
  var bar=document.getElementById("era-bar");
  var tb=document.getElementById("toolbar");
  if(sidebarOpen){
    sb.classList.remove("collapsed");
    tg.innerHTML="\u276F"; tg.style.left="80px";
    bar.style.left="80px"; tb.style.left="88px";
  } else {
    sb.classList.add("collapsed");
    tg.innerHTML="\u276E"; tg.style.left="0";
    bar.style.left="0"; tb.style.left="8px";
  }
}

if (isMobilePortrait) {
  document.getElementById('legend-body').classList.add('collapsed');
  document.getElementById('legend-toggle-btn').innerHTML = '▼';
  document.getElementById('era-sidebar').classList.add('collapsed');
  document.getElementById('sidebar-toggle').innerHTML = '\u276E';
}

updateEraBar(currentEra === '全部' ? {label:'全部', color:'#C8A951', yrs:'全朝代', desc:'华夏千年，万墳墓迹，一图尽览。'} : ERAS.find(function(e) { return e.label === currentEra; }));

var MAP_URLS = [
  './china.json',
  'https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json',
  'https://cdn.jsdelivr.net/npm/china-geojson@1.0.0/china.json',
  'https://unpkg.com/china-map-echarts@latest/src/china.json',
];

function tryLoadMap(urls, index) {
  if (index >= urls.length) {
    var isFileProtocol = window.location.protocol === 'file:';
    var tip = isFileProtocol
      ? '检测到你正在直接打开本地文件，请改用本地服务器访问（如：python3 -m http.server）'
      : '请检查网络连接或确认 china.json 是否可访问';
    document.getElementById('loading').innerHTML =
      '<span style="color:#FF6347">\u5730\u56FE\u52A0\u8F7D\u5931\u8D25\uFF0C\u6240\u6709\u6E90\u5747\u4E0D\u53EF\u7528<br><small style="opacity:.6">' + tip + '</small></span>';
    return;
  }
  document.querySelector('#loading span').textContent = '\u6B63\u5728\u52A0\u8F7D\u5730\u56FE (' + (index+1) + '/' + urls.length + ')...';
  fetch(urls[index])
    .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function(geoJson) {
      document.getElementById('loading').classList.add('hidden');
      echarts.registerMap('china', geoJson);
      chart = echarts.init(document.getElementById('chart'), null, { renderer:'canvas' });
      renderChart();
      chart.on('click', function(params) {
        if (params.seriesName === 'sites' || params.seriesName === 'active') {
          handleSiteClick(params.name);
        } else {
          closePanel();
        }
      });
      window.addEventListener('resize', function() { chart.resize(); });
    })
    .catch(function() { tryLoadMap(urls, index + 1); });
}

if (!window.echarts) {
  document.getElementById('loading').innerHTML =
    '<span style="color:#FF6347">ECharts 脚本加载失败<br><small style="opacity:.6">请检查网络，或将 echarts.min.js 下载到本地后改为本地引用</small></span>';
} else {
  tryLoadMap(MAP_URLS, 0);
}
</script>
